<!DOCTYPE html>
<html lang="en">
<head>
    <title>Universal Competency Audit v7.0</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: auto; padding: 30px; background: #f0f2f5; }
        .panel { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        textarea, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        .audit-results { margin-top: 25px; border-top: 2px solid #333; padding-top: 20px; }
        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>Universal Competency Audit</h1>
    <input type="text" id="compName" placeholder="Competency Name (e.g., Finance, Engineering, Healthcare)">
    <textarea id="masterDict" placeholder="Enter comma-separated 'Mastery Keywords' for this competency (e.g., compliance, strategy, fiscal, methodology, infrastructure)"></textarea>
    <textarea id="cInput" rows="8" placeholder="Paste candidate response here..."></textarea>
    <button onclick="runUniversalAudit()" style="width:100%; padding:15px; background:#1a2a6c; color:white; border:none; cursor:pointer;">EXECUTE AUDIT</button>

    <div id="results" class="audit-results" style="display:none;">
        <h3>Audit Summary: <span id="rComp"></span></h3>
        <div class="score-grid">
            <div style="background:#f9f9f9; padding:15px;">Domain Lexicon: <span id="s1"></span>/9</div>
            <div style="background:#f9f9f9; padding:15px;">Grammar Logic: <span id="s2"></span>/9</div>
            <div style="background:#f9f9f9; padding:15px;">Cohesion: <span id="s3"></span>/9</div>
            <div style="background:#f9f9f9; padding:15px; color:red;">Penalty Points: <span id="s4"></span></div>
        </div>
        <h2 style="text-align:center;">Final Competency Band: <span id="finalBand"></span></h2>
    </div>
</div>

<script>
function runUniversalAudit() {
    const text = document.getElementById('cInput').value.toLowerCase();
    const dict = document.getElementById('masterDict').value.toLowerCase().split(',').map(s => s.trim());
    
    // 1. Lexical: Count occurrences of your specific dictionary terms
    let lexicalCount = 0;
    dict.forEach(word => { if(text.includes(word)) lexicalCount++; });
    const s1 = Math.min(9, lexicalCount * 1.5).toFixed(1);

    // 2. Grammar: Universal academic markers (Passive/Conditionals)
    const grammarMatches = (text.match(/\b(was|were|has been|had been)\s\w+ed\b/gi) || []).length + 
                           (text.match(/\b(although|whereas|notwithstanding|consequently|provided that)\b/gi) || []).length;
    const s2 = Math.min(9, 4 + (grammarMatches * 0.8)).toFixed(1);

    // 3. Cohesion: Logical markers
    const cohMatches = (text.match(/\b(furthermore|however|subsequently|concurrently|nevertheless|in addition)\b/gi) || []).length;
    const s3 = Math.min(9, 4 + (cohMatches * 0.8)).toFixed(1);

    // 4. Penalty: Informal/Casual markers (Universal)
    const casualMatches = (text.match(/\b(check|good|bad|get|fix|later|hard|fast|stuff|really|thing|lots)\b/gi) || []).length;
    const s4 = Math.min(9, casualMatches * 1.2).toFixed(1);

    // Final Calculation
    const band = Math.max(1, ((parseFloat(s1) + parseFloat(s2) + parseFloat(s3)) / 3) - (s4 / 4)).toFixed(1);

    document.getElementById('rComp').innerText = document.getElementById('compName').value;
    document.getElementById('s1').innerText = s1;
    document.getElementById('s2').innerText = s2;
    document.getElementById('s3').innerText = s3;
    document.getElementById('s4').innerText = s4;
    document.getElementById('finalBand').innerText = band;
    document.getElementById('results').style.display = 'block';
}
</script>
</body>
</html>
